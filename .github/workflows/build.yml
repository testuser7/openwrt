name: Build

on: workflow_dispatch

jobs:
  build:
    name: Build firmware images
    runs-on: ubuntu-24.04-arm
    env:
      OS: ubuntu-24.04-arm
      TARGET: mediatek
      SUBTARGET: filogic
      VERSION: "main"
    defaults:
      run:
        working-directory: ${{ env.TARGET }}_${{ env.VERSION }}
    permissions:
      actions: write
      contents: write
    steps:
      - name: Install packages
        uses: gerlero/apt-install@v1
        with:
          packages: >
            build-essential
            clang
            gettext

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.TARGET }}_${{ env.VERSION }}
          key: ${{ env.OS }}-${{ env.TARGET }}_${{ env.VERSION }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: ${{ env.TARGET }}_${{ env.VERSION }}
          clean: false

      - name: Get SHA
        uses: benjlevesque/short-sha@v4.0

      - name: Import config
        run: mv .config_${{ env.TARGET }}_${{ env.SUBTARGET }}_${{ env.VERSION }} .config

      - name: Add Go path
        run: echo "CONFIG_GOLANG_EXTERNAL_BOOTSTRAP_ROOT=\"$(go env GOROOT)\"" >> .config

      - name: Update config
        run: make defconfig

      - name: Update feeds
        run: make package/symlinks

      - name: Prepare build
        run: make -j$(($(nproc)+1)) download prepare

      - name: Check dtb
        run: make -j1 V=sc target/linux/dtb

      - name: Build firmware images
        run: make -j$(($(nproc)+1)) world

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          commit: ${{ github.sha }}
          tag: ${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.VERSION }}-${{ env.SHA }}
          artifacts: |
            ${{ env.TARGET }}_${{ env.VERSION }}/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/openwrt-${{ env.TARGET }}-${{ env.SUBTARGET }}-*
            ${{ env.TARGET }}_${{ env.VERSION }}/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/mt798*
          makeLatest: true
          body: "Branch: ${{ github.ref_name }}"